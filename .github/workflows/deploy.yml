name: CI-CD pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

        - name: "Checkout "
          uses: actions/checkout@v4

        - name: "Configure AWS credentials"
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-region: ap-south-1

        - name: "Create S3 bucket "
          run: |
            aws s3api create-bucket --bucket static-website-2026 --region ap-south-1 --create-bucket-configuration LocationConstraint=ap-south-1

        - name: "Upload to S3"
          run: |
            aws s3 sync . s3://static-website --exclude ".git/*" 

        - name: "Login Docker"
          uses: docker/login-action@v3
          with :
            username: ${{secrets.Docker_user}}
            password: ${{secrets.Docker_pass}}


        - name: "Build and push the docker image "
          uses: docker/build-push-action@v5
          with:
            context: .
            push: true
            tags: ${{secrets.Docker_user}}/s3:latest
    
  _deploy:
      needs: build
      runs-on: ubuntu-latest

      steps:
        - name: "Checkout "
          uses: actions/checkout@v4

        - name: "Install python ,plugins and dependencies "
          run: |
            python -m pip install --upgrade pip
            pipx inject ansible-core boto3 botocore
            ansible-galaxy collection install amazon.aws 

            which python
            which ansible

        - name: "Copy SSH key"
          working-directory: ansible
          run: |
            echo "${{secrets.ssh}}" > instance-key.pem
            chmod 400 instance-key.pem

        - name: "Play the playbook"
          working-directory: ansible
          env: 
           AWS_ACCESS_KEY_ID: ${{secrets.AWS_ACCESS_KEY_ID}}
           AWS_SECRET_ACCESS_KEY: ${{secrets.AWS_SECRET_ACCESS_KEY}}
           AWS_DEFAULT_REGION: "ap-south-1"
          
          run: |
           ansible-inventory inventory/aws_ec2.yml --list
           ansible-playbook -i inventory/aws_ec2.yml play.yml
